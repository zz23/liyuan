<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>互动卡片</title>

<style>
body{
  margin:0;
  font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;

  background:linear-gradient(270deg,#fdf6f0,#fde2e4,#fce1ec);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

/* 🌸 背景流动 */
@keyframes bgMove{
  0%{ background-position:0% 50%;}
  50%{ background-position:100% 50%;}
  100%{ background-position:0% 50%;}
}

/* 光晕 */
body::before{
  content:"";
  position:fixed;
  width:300px;
  height:300px;
  background:radial-gradient(circle,#ffd6e0,transparent);
  top:20%;
  left:10%;
  filter:blur(80px);
  pointer-events:none;
  animation:lightMove 18s ease-in-out infinite;
}

@keyframes lightMove{
  0%{ transform:translate(0,0);}
  50%{ transform:translate(40px,30px);}
  100%{ transform:translate(0,0);}
}

/* 居中 */
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

/* 首页 */
.home{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 按钮 */
button{
  touch-action:manipulation;
}

.start-btn{
  padding:16px 36px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff8fab,#6d7cff);
  color:#fff;
}
.start-btn:active{ transform:scale(0.95); }

/* 卡片 */
.card{
  width:100%;
  max-width:360px;
  min-height:180px;
  max-height:60vh;

  background:#fff;
  border-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  padding:28px 22px;

  font-size:20px;
  line-height:1.6;

  transition:0.35s;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%{ transform:translateY(0);}
  50%{ transform:translateY(-4px);}
  100%{ transform:translateY(0);}
}

/* 翻页 */
.slide-out{
  transform:translateX(120%);
  opacity:0;
}
.slide-in{
  transform:translateX(-120%);
  opacity:0;
}

/* 控制区 */
.controls{
  margin-top:24px;
  display:flex;
  align-items:center;
  gap:12px;
  position:relative;
}

.btn{
  padding:14px 28px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#ff8fab,#6d7cff);
  color:#fff;
}
.btn:active{ transform:scale(0.95); }

/* 💗 爱心 */
.heart{
  position:absolute;
  font-size:16px;
  color:#ff6b9d;
  animation:heart 0.8s ease forwards;
}

@keyframes heart{
  0%{ transform:translate(0,0) scale(1); opacity:1;}
  100%{ transform:translate(var(--x), var(--y)) scale(0.5); opacity:0;}
}

/* 🐶 */
.dog{
  position:fixed;
  width:90px;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.hidden{display:none}
</style>
</head>

<body>

<!-- 首页 -->
<div class="home" id="home">
  <div style="display:flex;flex-direction:column;gap:16px;">
    <button class="start-btn" onclick="start(false)">开始互动</button>
    <button class="start-btn" onclick="start(true)" style="opacity:0.85;">
      🎲 随机模式
    </button>
  </div>
</div>

<!-- 游戏 -->
<div class="container hidden" id="game">
  <div class="card" id="card">
    <div id="question">点击开始</div>
  </div>

  <div class="controls" id="controls">
    <span id="counter">1 / 100</span>
    <button class="btn" onclick="next()">回答 / 下一题</button>
  </div>
</div>

<img src="dog.png" id="dog" class="dog hidden"/>

<script>

let currentIndex = 0;
let isRandomMode = false;

const firstQuestion = "你最近有没有一刻，是觉得“这样其实挺舒服的”？";

"偶尔会不会觉得，什么都不做反而最解压？",
"比起热闹的安排，你会更喜欢什么样的相处节奏？",
"如果今天完全由自己安排，最想把时间花在哪儿？",
"一段特别顺的日子，对你来说通常是什么感觉？",
"最近一次让你觉得“还不错”的瞬间，是在什么时候？",
"平时更容易让你恢复能量的，是独处还是和熟人待着？",

"当生活节奏很满的时候，你通常怎么把自己拉回来？",
"有些时候，什么样的环境会让你一下子放松下来？",
"说起周末，你会更偏向怎么过才舒服？",
"如果连续几天都很累，你最想用什么方式缓一缓？",
"你会不会更喜欢熟悉一点的节奏，不太折腾？",
"比起计划得很满的安排，你会更偏向哪一种？",
"平时会不会有那种，一回到熟悉的空间就松下来的感觉？",
"最近有没有发现，自己其实更适合某一种生活节奏？",
"对你来说，最理想的休息，通常长什么样？",
"如果一个周末完全空出来，你会怎么让它过得舒服一点？",

"聊到看剧或者听小说的时候，你更在意的是内容还是那个状态？",
"有没有哪种内容，一看就会让你马上安静下来？",
"平时会不会有特别固定的放松方式，已经习惯了？",
"如果那天心情有点乱，你一般会先做什么让自己安静下来？",
"有时候你会不会更想躲进自己的小世界里待一会儿？",
"最近有没有一部剧、一本书，或者一个故事让你记得比较久？",
"比起特别热闹的娱乐，你会不会更喜欢安静一点的消遣？",
"什么时候你会觉得，听点东西比说话更舒服？",
"有些内容会让人越看越轻松，你会有这种感觉吗？",
"对你来说，最能帮你“切换状态”的事情是什么？",

"你小时候更习惯哪种生活节奏，现在和那时候像吗？",
"一路到现在，什么地方的你变化得比较明显？",
"有些习惯是慢慢养成的，你会觉得自己有哪种习惯特别稳定吗？",
"成长以后，你觉得自己最明显的变化是什么？",
"过去和现在比起来，你会觉得自己更了解自己了吗？",
"有时候人会慢慢变得更安静，你会有这种感觉吗？",
"你会不会觉得，自己现在比以前更挑生活状态了？",
"有没有哪一段时间，让你突然发现自己变了不少？",
"如果要说“现在的自己”和“以前的自己”最大的不同，你会先想到什么？",
"哪些东西会让你觉得，自己还是很像以前的那个自己？",

"说到做自己，你会更在意哪一部分？",
"有时候外界声音太多，会不会让你想先慢一点再决定？",
"如果一件事不是特别确定，你一般会先听谁的想法？",
"在你看来，真正适合自己的选择，通常会有什么感觉？",
"有没有哪一次，你明显感觉到自己是被环境影响了？",
"遇到不同声音的时候，你更容易坚持自己，还是先听听看？",
"如果有些事情别人看法很多，你会不会想先回到自己的判断里？",

"慢热这件事，对你来说更像性格，还是一种习惯？",

"在关系里，你会不会更喜欢慢一点靠近？",
"你觉得舒服的相处，最重要的一点会是什么？",
"对你来说，什么样的人会让你很快觉得安心？",

"什么时候你会觉得，对方是懂节奏的人？",
"如果相处得越来越自然，你一般会是什么感觉？",

"你比较喜欢别人主动一点，还是留一点空间更舒服？",
"如果对方很急，你会不会下意识先退一步？",

"有时候，太刻意反而会让人不舒服，你会有这种感觉吗？",

"对你来说，边界感和亲近感之间，哪个更难拿捏？",
"你会不会更喜欢那种不用解释太多，也能懂一点的人？",

"你会不会更愿意先熟起来，再慢慢看别的东西？",
"如果两个人越来越默契，你会把它看成很重要的事吗？",

"你会不会更在意对方是不是能让你舒服地做自己？",
"如果一个人让你很轻松，你会不会特别珍惜这种感觉？",
"你会更喜欢稳一点的关系，还是有一点变化也可以？",
"当两个人慢慢变熟，你会更期待什么？",
"你觉得长期相处里，最重要的是稳定，还是舒服？",
"如果未来的相处能越来越自然，你会希望它是什么样？",

"有时候，人会在某个阶段重新认识自己，你有过这种感觉吗？",
"你会不会觉得，自己越来越知道哪些东西适合自己？",
"当你开始更在意自己的感受，生活会有什么变化？",
"最近有没有一件事，让你更确定了自己的想法？",
"如果回头看，你会觉得自己变得更坚定了吗？",
"你会不会越来越不想勉强自己去适应太多？",
"哪些时候你会明显感觉，自己现在比以前更清醒？",
"你会怎么形容现在的自己？",
"如果“像自己”这件事有一个答案，你觉得它更接近什么状态？",
"未来一段时间，你最想让自己多一点什么？"
];

/* 🐶 开场 */
function start(random){
  isRandomMode = random;

  const dog = document.getElementById("dog");
  dog.classList.remove("hidden");

  setTimeout(()=>{
    dog.classList.add("hidden");
    document.getElementById("home").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    next();
  },600);
}

/* 💗 */
function showHearts(){
  const container = document.getElementById("controls");

  for(let i=0;i<6;i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💗";

    heart.style.setProperty("--x",(Math.random()*80-40)+"px");
    heart.style.setProperty("--y",(Math.random()*-80-20)+"px");

    container.appendChild(heart);
    setTimeout(()=>heart.remove(),800);
  }
}

/* 取题 */
function getQuestion(){

  if(isRandomMode){
    return questions[Math.floor(Math.random()*questions.length)];
  }

  if(currentIndex === 0) return firstQuestion;

  if(currentIndex-1 < questions.length){
    return questions[currentIndex-1];
  }

  return "今天先到这里～下次继续 😄";
}

function next(){

  showHearts();

  const card = document.getElementById("card");
  const qEl = document.getElementById("question");

  card.classList.add("slide-out");

  setTimeout(()=>{
    qEl.style.opacity = 0;

    const q = getQuestion();
    qEl.innerText = q;

    setTimeout(()=>{ qEl.style.opacity = 1; },50);

    card.classList.remove("slide-out");
    card.classList.add("slide-in");

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        card.classList.remove("slide-in");
      });
    });

  },300);

  currentIndex++;
  document.getElementById("counter").innerText = currentIndex + " / 100";
}

</script>

</body>
</html>
